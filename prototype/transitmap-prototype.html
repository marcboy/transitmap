<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitMap — Ambient Prototype</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.07);
    --text: #e8edf5;
    --muted: rgba(255,255,255,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    user-select: none;
  }

  /* ── MAP ── */
  #map-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  #leaflet-map {
    width: 100%; height: 100%;
    background: #080c14;
  }

  /* Hide Leaflet attribution (keep it for production) */
  .leaflet-control-attribution { display: none; }
  .leaflet-control-zoom { display: none; }

  /* Subtle tint — just enough to make train lines pop */
  #map-tint {
    position: absolute;
    inset: 0;
    background: rgba(4, 8, 18, 0.18);
    pointer-events: none;
    z-index: 399;
  }

  /* Train canvas sits above tiles and tint */
  #train-canvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 400;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 24px 32px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    background: linear-gradient(to bottom, rgba(8,12,20,0.92) 0%, transparent 100%);
    pointer-events: none;
    z-index: 500;
    transition: right 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .city-name {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
    line-height: 1;
  }

  .city-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* ── CITY SWITCHER ── */
  .city-switcher {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 500;
    background: rgba(8,12,20,0.85);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 5px;
    backdrop-filter: blur(12px);
    transition: left 0.6s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
  }

  .city-btn {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    color: var(--muted);
    background: transparent;
    transition: all 0.25s;
    letter-spacing: 0.3px;
  }

  .city-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
  .city-btn:hover:not(.active) { color: rgba(255,255,255,0.65); }

  /* ── BOTTOM LEGEND ── */
  .legend {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 32px;
    background: linear-gradient(to top, rgba(8,12,20,0.92) 0%, transparent 100%);
    z-index: 500;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    transition: right 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .lines-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    max-width: 70%;
  }

  .line-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px 4px 6px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }

  .line-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .clock-time {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: -1px;
    line-height: 1;
    text-align: right;
  }

  .clock-date {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 4px;
    text-align: right;
  }

  .train-count {
    position: absolute;
    bottom: 110px; right: 32px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-align: right;
    z-index: 500;
    text-transform: uppercase;
    transition: right 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .train-count span {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.55);
    display: block;
    line-height: 1;
  }

  /* ── SPLIT-SCREEN AD ── */
  #map-wrap.ad-active { width: 50%; }

  .ad-active-ui .topbar,
  .ad-active-ui .legend { right: 50%; }
  .ad-active-ui .city-switcher { left: 25%; transform: translateX(-50%); }
  .ad-active-ui .train-count   { right: calc(50% + 32px); }

  .ad-panel {
    position: absolute;
    top: 0; right: 0;
    width: 50%; height: 100%;
    background: #0d1120;
    border-left: 1px solid rgba(255,255,255,0.08);
    z-index: 600;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 44px;
    transform: translateX(100%);
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    pointer-events: none;
  }

  .ad-panel.visible { transform: translateX(0); pointer-events: auto; }

  .ad-panel-inner { max-width: 420px; margin: 0 auto; width: 100%; }

  .ad-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .ad-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
  }

  .ad-skip {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }

  .ad-skip:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  .ad-image-placeholder {
    width: 100%;
    aspect-ratio: 16/7;
    border-radius: 12px;
    background: linear-gradient(135deg, #1e2d4a 0%, #2a1640 50%, #1a2d1a 100%);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .ad-image-placeholder::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(80,140,255,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 60%, rgba(180,80,255,0.12) 0%, transparent 55%);
  }

  .ad-img-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    z-index: 1;
  }

  .ad-brand {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.32);
    margin-bottom: 10px;
  }

  .ad-headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 3vw, 34px);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 14px;
  }

  .ad-body {
    font-size: 13px;
    color: rgba(255,255,255,0.42);
    line-height: 1.65;
    margin-bottom: 28px;
  }

  .ad-cta {
    display: inline-block;
    padding: 12px 28px;
    background: #fff;
    color: #080c14;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: opacity 0.2s;
    margin-bottom: 28px;
  }

  .ad-cta:hover { opacity: 0.85; }

  .ad-timer-bar { height: 2px; background: rgba(255,255,255,0.07); border-radius: 1px; overflow: hidden; }
  .ad-timer-fill { height: 100%; background: rgba(255,255,255,0.3); transform-origin: left; border-radius: 1px; }

  .ad-divider {
    position: absolute;
    top: 0; left: 50%;
    width: 1px; height: 100%;
    background: rgba(255,255,255,0.06);
    z-index: 601;
    transform: scaleX(0);
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s;
  }
  .ad-divider.visible { transform: scaleX(1); }

  /* ── CITY FADE ── */
  .fade-cover {
    position: absolute; inset: 0;
    background: var(--bg);
    z-index: 700;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .fade-cover.active { opacity: 1; }
</style>
</head>
<body>

<div id="map-wrap">
  <div id="leaflet-map"></div>
  <div id="map-tint"></div>
  <canvas id="train-canvas"></canvas>
</div>

<div class="city-switcher">
  <button class="city-btn active" onclick="switchCity('nyc',this)">&#127482;&#127480; New York</button>
  <button class="city-btn"        onclick="switchCity('paris',this)">&#127467;&#127479; Paris</button>
  <button class="city-btn"        onclick="switchCity('seattle',this)">&#127482;&#127480; Seattle</button>
</div>

<div class="topbar">
  <div>
    <div class="city-name" id="cityName">New York City</div>
    <div class="city-sub">Live Subway &middot; <span id="trainCountInline">0</span> trains active</div>
  </div>
  <div class="status-pill">
    <div class="pulse-dot"></div>
    <span id="statusLabel">Connecting&hellip;</span>
  </div>
</div>

<div class="train-count">
  <span id="trainCountBig">0</span>trains
</div>

<div class="legend">
  <div class="lines-row" id="linesRow"></div>
  <div>
    <div class="clock-time" id="clockTime">--:--</div>
    <div class="clock-date" id="clockDate">---</div>
  </div>
</div>

<!-- Split-screen ad -->
<div class="ad-divider" id="adDivider"></div>
<div class="ad-panel" id="adPanel">
  <div class="ad-panel-inner">
    <div class="ad-top-row">
      <div class="ad-label">Advertisement</div>
      <div class="ad-skip" onclick="closeAd()">&#10005; Dismiss</div>
    </div>
    <div class="ad-image-placeholder">
      <div class="ad-img-label">Ad Creative</div>
    </div>
    <div class="ad-brand">Sponsored</div>
    <div class="ad-headline">Explore NYC<br>Like Never Before</div>
    <div class="ad-body">Discover hidden gems across all five boroughs with local guides curated by real New Yorkers.</div>
    <div class="ad-cta">Learn More</div>
    <div class="ad-timer-bar"><div class="ad-timer-fill" id="adTimerFill"></div></div>
  </div>
</div>

<div class="fade-cover" id="fadeCover"></div>

// ── LEAFLET MAP SETUP ─────────────────────────────────────────

// Lighter dark CartoDB tiles — streets visible, not pitch black
const TILE_URL = 'https://{s}.basemaps.cartocdn.com/dark_matter_lite/{z}/{x}/{y}{r}.png';

let leafletMap = L.map('leaflet-map', {
  zoomControl:        false,
  attributionControl: false,
  dragging:           true,
  scrollWheelZoom:    true,
  doubleClickZoom:    false,
});

L.tileLayer(TILE_URL, { maxZoom: 19 }).addTo(leafletMap);

// Route polylines layer group
let routeLayer = L.layerGroup().addTo(leafletMap);

// ── TRAIN CANVAS (overlays the map) ──────────────────────────

const trainCanvas = document.getElementById('train-canvas');
const tCtx        = trainCanvas.getContext('2d');

function resizeCanvas() {
  trainCanvas.width  = window.innerWidth;
  trainCanvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── STATE ─────────────────────────────────────────────────────

let cityId  = 'nyc';
let trains  = [];

// ── DRAW ROUTES AS LEAFLET POLYLINES ─────────────────────────

function drawRoutes() {
  routeLayer.clearLayers();
  const cfg = CITIES[cityId];

  cfg.routes.forEach(route => {
    // Glow pass (thick, transparent)
    L.polyline(route.path, {
      color:   route.color,
      weight:  14,
      opacity: 0.12,
      lineCap: 'round',
      lineJoin:'round',
    }).addTo(routeLayer);

    // Main line
    L.polyline(route.path, {
      color:   route.color,
      weight:  3.5,
      opacity: 0.75,
      lineCap: 'round',
      lineJoin:'round',
    }).addTo(routeLayer);

    // Station dots
    route.path.forEach(pt => {
      L.circleMarker(pt, {
        radius:      4,
        fillColor:   route.color,
        color:       route.color,
        fillOpacity: 0.8,
        weight:      0,
      }).addTo(routeLayer);
    });
  });
}

// ── TRAIN SIMULATION ─────────────────────────────────────────

function spawnTrains() {
  trains = [];
  CITIES[cityId].routes.forEach(route => {
    // More trains on longer routes — Paris M1/M4/M13 carry far more than NYC
    const n = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      trains.push({
        route,
        t:      Math.random(),
        speed:  0.00007 + Math.random() * 0.00011,
        status: Math.random() > 0.75 ? 'STOP' : 'MOVE',
        stopMs: 0,
        phase:  Math.random() * Math.PI * 2,
      });
    }
  });
  syncCounts();
}

function syncCounts() {
  document.getElementById('trainCountBig').textContent    = trains.length;
  document.getElementById('trainCountInline').textContent = trains.length;
}

function trainLatLng(tr) {
  const path = tr.route.path;
  const pos  = tr.t * (path.length - 1);
  const i    = Math.min(Math.floor(pos), path.length - 2);
  const f    = pos - i;
  const a    = path[i], b = path[i + 1];
  return [ a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f ];
}

function stepTrains(dt) {
  trains.forEach(tr => {
    tr.phase += 0.05;
    if (tr.status === 'STOP') {
      tr.stopMs += dt;
      if (tr.stopMs > 1800 + Math.random() * 1200) { tr.status = 'MOVE'; tr.stopMs = 0; }
    } else {
      tr.t += tr.speed * (dt / 16);
      if (tr.t >= 1) {
        tr.t = Math.random() * 0.05;
        if (Math.random() > 0.5) { tr.status = 'STOP'; tr.stopMs = 0; }
      }
      if (Math.random() < 0.0015) { tr.status = 'STOP'; tr.stopMs = 0; }
    }
  });
}

// ── DRAW TRAINS ON CANVAS ────────────────────────────────────

function drawTrains() {
  const w = trainCanvas.width, h = trainCanvas.height;
  tCtx.clearRect(0, 0, w, h);

  trains.forEach(tr => {
    const [lat, lng] = trainLatLng(tr);

    // Convert lat/lng → pixel using Leaflet's projection
    const pt = leafletMap.latLngToContainerPoint([lat, lng]);
    const x  = pt.x, y = pt.y;

    if (x < -30 || x > w + 30 || y < -30 || y > h + 30) return;

    const r     = 11;
    const pulse = (Math.sin(tr.phase) + 1) / 2;
    const col   = tr.route.color;

    // Pulse ring when stopped
    if (tr.status === 'STOP') {
      tCtx.beginPath();
      tCtx.arc(x, y, r * (1.8 + pulse * 1.0), 0, Math.PI * 2);
      const a = Math.round(pulse * 120).toString(16).padStart(2, '0');
      tCtx.strokeStyle = col + a;
      tCtx.lineWidth   = 2;
      tCtx.stroke();
    }

    // Glow halo
    const grd = tCtx.createRadialGradient(x, y, 0, x, y, r * 3);
    grd.addColorStop(0, col + 'cc');
    grd.addColorStop(1, col + '00');
    tCtx.beginPath();
    tCtx.arc(x, y, r * 3, 0, Math.PI * 2);
    tCtx.fillStyle = grd;
    tCtx.fill();

    // Circle
    tCtx.beginPath();
    tCtx.arc(x, y, r, 0, Math.PI * 2);
    tCtx.fillStyle = col;
    tCtx.fill();

    // White ring
    tCtx.beginPath();
    tCtx.arc(x, y, r, 0, Math.PI * 2);
    tCtx.strokeStyle = 'rgba(255,255,255,0.3)';
    tCtx.lineWidth   = 1.5;
    tCtx.stroke();

    // Label
    const bright = ['#FFCD00','#FCCC0A','#B6BD00','#6CBE45','#6ECA97','#A7A9AC'];
    tCtx.fillStyle      = bright.includes(col) ? '#111' : '#fff';
    tCtx.font           = 'bold 9px DM Mono, monospace';
    tCtx.textAlign      = 'center';
    tCtx.textBaseline   = 'middle';
    tCtx.fillText(tr.route.id, x, y + 0.5);
  });
}

// ── RENDER LOOP ───────────────────────────────────────────────

let last = 0;
function loop(ts) {
  const dt = Math.min(ts - last, 100);
  last = ts;
  stepTrains(dt);
  drawTrains();
  requestAnimationFrame(loop);
}

// ── CITY SWITCH ───────────────────────────────────────────────

function switchCity(id, btn) {
  if (id === cityId) return;
  const cover = document.getElementById('fadeCover');
  cover.classList.add('active');

  setTimeout(() => {
    cityId = id;
    const cfg = CITIES[id];
    document.getElementById('cityName').textContent = cfg.name;

    // Fly map to new city
    leafletMap.setView(cfg.center, cfg.zoom, { animate: false });

    drawRoutes();
    spawnTrains();
    renderLegend();

    document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    setTimeout(() => cover.classList.remove('active'), 380);
  }, 350);
}

// ── LEGEND ────────────────────────────────────────────────────

function renderLegend() {
  document.getElementById('linesRow').innerHTML = CITIES[cityId].lines.map(l =>
    `<div class="line-chip">
       <div class="line-dot" style="background:${l.color};box-shadow:0 0 5px ${l.color}88"></div>
       ${l.name}
     </div>`
  ).join('');
}

// ── CLOCK ─────────────────────────────────────────────────────

function tick() {
  const n  = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}`;
  document.getElementById('clockDate').textContent = n.toLocaleDateString('en-US',
    { weekday:'short', month:'short', day:'numeric' }).toUpperCase();
}

// ── ADS — 5-MINUTE SPLIT SCREEN ──────────────────────────────

const AD_INTERVAL = 5 * 60 * 1000;
const AD_DURATION = 30 * 1000;
let adTimeout, adAutoDismiss;

function scheduleAd() {
  clearTimeout(adTimeout);
  clearTimeout(adAutoDismiss);
  adTimeout = setTimeout(showAd, AD_INTERVAL);
}

function showAd() {
  document.getElementById('map-wrap').classList.add('ad-active');
  document.body.classList.add('ad-active-ui');
  document.getElementById('adPanel').classList.add('visible');
  document.getElementById('adDivider').classList.add('visible');

  // Shrink map so Leaflet knows its container changed
  setTimeout(() => leafletMap.invalidateSize(), 650);

  const fill = document.getElementById('adTimerFill');
  fill.style.transition = 'none';
  fill.style.transform  = 'scaleX(1)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = `transform ${AD_DURATION / 1000}s linear`;
    fill.style.transform  = 'scaleX(0)';
  }));

  adAutoDismiss = setTimeout(closeAd, AD_DURATION);
}

function closeAd() {
  clearTimeout(adAutoDismiss);
  document.getElementById('adPanel').classList.remove('visible');
  document.getElementById('adDivider').classList.remove('visible');
  setTimeout(() => {
    document.getElementById('map-wrap').classList.remove('ad-active');
    document.body.classList.remove('ad-active-ui');
    setTimeout(() => leafletMap.invalidateSize(), 650);
  }, 600);
  scheduleAd();
}

// ── INIT ──────────────────────────────────────────────────────

const cfg0 = CITIES[cityId];
leafletMap.setView(cfg0.center, cfg0.zoom);
drawRoutes();
spawnTrains();
renderLegend();
tick();
setInterval(tick, 10000);
scheduleAd();

setTimeout(() => {
  document.getElementById('statusLabel').textContent = 'Live · 20s refresh';
}, 1500);

requestAnimationFrame(loop);
</script>
