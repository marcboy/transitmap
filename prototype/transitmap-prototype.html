<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>TransitMap — Ambient Prototype</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#080c14; --surface:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --muted:rgba(255,255,255,0.72); }
  html,body { width:100%; height:100%; background:var(--bg); color:#e8edf5; font-family:'DM Mono',monospace; overflow:hidden; user-select:none; }

  #map-wrap { position:absolute; top:0; left:0; width:100%; height:100%; }
  #leaflet-map { width:100%; height:100%; }
  .leaflet-control-zoom,.leaflet-control-attribution { display:none!important; }
  #tint { position:absolute; inset:0; background:rgba(4,8,18,0.2); pointer-events:none; z-index:399; }
  #trainCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:400; }

  .topbar { position:absolute; top:0; left:0; right:0; padding:24px 32px; display:flex; align-items:flex-start; justify-content:space-between; background:linear-gradient(to bottom,rgba(8,12,20,0.92) 0%,transparent 100%); pointer-events:none; z-index:500; }
  .city-name { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:#fff; line-height:1; }
  .city-sub  { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .status-pill { display:flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:11px; color:var(--muted); }
  .theme-btn { font-family:'DM Mono',monospace; font-size:13px; padding:7px 14px; border-radius:20px; border:1px solid var(--border); cursor:pointer; color:var(--muted); background:var(--surface); transition:all 0.25s; pointer-events:auto; line-height:1; }
  .theme-btn:hover { color:#fff; border-color:rgba(255,255,255,0.3); }
  .pulse-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .city-switcher { position:absolute; top:24px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:6px; z-index:500; background:rgba(8,12,20,0.85); border:1px solid var(--border); border-radius:30px; padding:5px; backdrop-filter:blur(12px); white-space:nowrap; }
  #recentBtns { display:flex; gap:6px; }
  .city-btn { font-family:'DM Mono',monospace; font-size:12px; padding:7px 18px; border-radius:20px; border:none; cursor:pointer; color:rgba(255,255,255,0.65); background:transparent; transition:all 0.25s; }
  .city-btn.active { background:rgba(255,255,255,0.15); color:#fff; }
  .city-btn:hover:not(.active) { color:#fff; }
  .city-switcher-sep { width:1px; height:18px; background:rgba(255,255,255,0.15); flex-shrink:0; }
  .city-more-wrap { position:relative; display:inline-flex; align-items:center; }
  .city-more-wrap select { font-family:'DM Mono',monospace; font-size:12px; padding:7px 28px 7px 14px; border-radius:20px; border:1px solid transparent; cursor:pointer; color:rgba(255,255,255,0.65); background:transparent; appearance:none; -webkit-appearance:none; outline:none; transition:color 0.25s; }
  .city-more-wrap select:hover { color:#fff; }
  .city-more-wrap select option { background:#0d1425; color:#e8edf5; }
  .city-more-wrap::after { content:'▾'; position:absolute; right:10px; color:rgba(255,255,255,0.4); pointer-events:none; font-size:9px; }

  .unlock-overlay { position:absolute; inset:0; background:rgba(4,8,18,0.82); z-index:800; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(10px); opacity:0; pointer-events:none; transition:opacity 0.25s; }
  .unlock-overlay.visible { opacity:1; pointer-events:auto; }
  .unlock-card { background:rgba(14,20,38,0.96); border:1px solid rgba(255,255,255,0.14); border-radius:24px; padding:36px 40px; max-width:360px; width:90%; text-align:center; }
  .unlock-icon { font-size:36px; margin-bottom:14px; }
  .unlock-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:#fff; margin-bottom:8px; }
  .unlock-desc { font-size:12px; color:rgba(255,255,255,0.55); line-height:1.7; margin-bottom:20px; }
  .unlock-cities { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:28px; }
  .unlock-city-chip { font-size:11px; padding:5px 13px; border-radius:14px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:rgba(255,255,255,0.8); }
  .unlock-btn { font-family:'DM Mono',monospace; font-size:13px; padding:13px 0; border-radius:24px; border:none; cursor:pointer; background:#fff; color:#080c14; font-weight:500; width:100%; margin-bottom:12px; transition:opacity 0.2s; }
  .unlock-btn:hover { opacity:0.88; }
  .unlock-dismiss { font-size:11px; color:rgba(255,255,255,0.35); background:none; border:none; cursor:pointer; font-family:'DM Mono',monospace; letter-spacing:0.5px; }
  .unlock-dismiss:hover { color:rgba(255,255,255,0.6); }

  .legend { position:absolute; bottom:0; left:0; right:0; padding:28px 32px; background:linear-gradient(to top,rgba(8,12,20,0.92) 0%,transparent 100%); z-index:500; display:flex; align-items:flex-end; justify-content:space-between; }
  .lines-row { display:flex; flex-wrap:wrap; gap:5px; max-width:70%; }
  .line-chip { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 6px; border-radius:20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); font-size:11px; color:rgba(255,255,255,0.9); }
  .line-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .version-stamp { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1px; margin-top:6px; text-align:right; }
  .sixkids-logo { margin-top:10px; text-align:right; }
  .sixkids-logo svg { width:110px; display:block; margin-left:auto; opacity:0.85; }
  .train-count { position:absolute; bottom:110px; right:32px; font-size:11px; color:rgba(255,255,255,0.7); letter-spacing:1px; text-align:right; z-index:500; text-transform:uppercase; }
  .train-count span { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; color:rgba(255,255,255,0.85); display:block; line-height:1; }

  .fade-cover { position:absolute; inset:0; background:var(--bg); z-index:700; opacity:0; pointer-events:none; transition:opacity 0.35s ease; }
  .fade-cover.active { opacity:1; }
  #fetch-log { position:absolute; top:80px; right:32px; z-index:501; background:rgba(4,8,16,0.92); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:10px 14px; font-size:10px; font-family:'DM Mono',monospace; color:rgba(255,255,255,0.7); min-width:300px; max-width:420px; line-height:1.6; pointer-events:none; }
  #fetch-log .fl-row { display:flex; gap:8px; border-bottom:1px solid rgba(255,255,255,0.06); padding:3px 0; }
  #fetch-log .fl-row:last-child { border-bottom:none; }
  #fetch-log .fl-ts  { color:rgba(255,255,255,0.35); flex-shrink:0; }
  #fetch-log .fl-ok  { color:#4ade80; }
  #fetch-log .fl-err { color:#f87171; }
  #fetch-log .fl-skip { color:#facc15; }
  #fetch-log .fl-hdr { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:5px; }
  #fetch-log .fl-stats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.08); }
  #fetch-log .fl-stat-city { display:flex; flex-direction:column; gap:1px; min-width:70px; }
  #fetch-log .fl-stat-name { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.35); }
  #fetch-log .fl-stat-nums { font-size:11px; }
  #fetch-log .fl-stat-ok  { color:#4ade80; }
  #fetch-log .fl-stat-err { color:#f87171; }
  #fetch-log .fl-stat-sep { color:rgba(255,255,255,0.2); }
  #fetch-log .fl-reset    { font-size:9px; color:rgba(255,255,255,0.2); margin-bottom:6px; }

  #departures-panel { position:absolute; bottom:90px; left:32px; z-index:500; background:rgba(8,12,20,0.82); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:14px 18px; backdrop-filter:blur(12px); min-width:270px; display:none; }
  #departures-panel.visible { display:block; }
  .dep-header { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .dep-line-dot { width:8px; height:8px; border-radius:50%; background:#0091DA; box-shadow:0 0 6px #0091DA88; flex-shrink:0; }
  .dep-row { display:flex; align-items:center; gap:0; padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.07); }
  .dep-row:last-child { border-bottom:none; }
  .dep-time { font-size:13px; color:#fff; font-weight:500; width:82px; }
  .dep-min { font-size:11px; color:rgba(255,255,255,0.5); width:58px; }
  .dep-min.soon { color:#4ade80; }
  .dep-dest { font-size:11px; color:rgba(255,255,255,0.65); }
  .dep-source { font-size:9px; letter-spacing:1.5px; color:rgba(255,255,255,0.28); margin-top:9px; text-align:right; text-transform:uppercase; }
</style>
</head>
<body>

<div id="map-wrap">
  <div id="leaflet-map"></div>
  <div id="tint"></div>
  <canvas id="trainCanvas"></canvas>
</div>

<div class="city-switcher" id="citySwitcher">
  <div id="recentBtns"></div>
  <div class="city-switcher-sep"></div>
  <div class="city-more-wrap">
    <select id="cityDropdown" onchange="if(this.value){pickCity(this.value);this.value='';}">
      <option value="">More ▾</option>
    </select>
  </div>
</div>

<div class="topbar">
  <div>
    <div class="city-name" id="cityName">New York City</div>
    <div class="city-sub">Live Transit &middot; <span id="trainCountInline">0</span> trains active</div>
    <div class="city-sub" id="localTime" style="margin-top:4px; letter-spacing:1px;"></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;pointer-events:auto;">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle map theme">☀</button>
    <div class="status-pill">
      <div class="pulse-dot"></div>
      <span id="statusLabel">Loading&hellip;</span>
    </div>
  </div>
</div>

<div class="train-count"><span id="trainCountBig">0</span>trains</div>

<div class="legend">
  <div class="lines-row" id="linesRow"></div>
  <div>
    <div class="version-stamp" id="versionStamp">v1.3</div>
    <div class="version-stamp" id="workerStamp" style="opacity:0.6"></div>
    <div class="sixkids-logo">

// ── Shinkansen Timetable Engine ──────────────────────────────
// Trains are positioned from official schedules + current JST clock.
// No API key needed. Works for all lines including Tokaido (no public RT API).
// Shinkansen average delay is ~36 seconds, so timetable = ground truth.
//
// Each service definition: stops are [lat, lng, minutesFromDeparture]
// addService() auto-generates both directions.

const SHIN_SERVICES = [];

function addService(lineId, color, stops, firstDep, lastDep, interval) {
  SHIN_SERVICES.push({ lineId, color, stops, firstDep, lastDep, interval });
  // Reverse direction: reverse stop order, recalculate times from zero
  const dur = stops[stops.length - 1][2];
  const rev = stops.slice().reverse().map(([la, ln, t]) => [la, ln, dur - t]);
  SHIN_SERVICES.push({ lineId, color, stops: rev, firstDep, lastDep, interval });
}

// Returns current JST minutes-since-midnight
function jstNow() {
  return ((Date.now() + 9 * 3600 * 1000) % 86400000) / 60000;
}

// Interpolate lat/lng along a stop sequence at `elapsed` minutes from departure
function shinPos(stops, elapsed) {
  for (let i = 0; i < stops.length - 1; i++) {
    const [la1, ln1, t1] = stops[i];
    const [la2, ln2, t2] = stops[i + 1];
    if (elapsed >= t1 && elapsed <= t2) {
      const f = (elapsed - t1) / (t2 - t1);
      return { lat: la1 + (la2 - la1) * f, lng: ln1 + (ln2 - ln1) * f };
    }
  }
  return null;
}

// Compute all Shinkansen trains running right now
function computeShinkansenTrains() {
  const now = jstNow();
  const result = [];
  for (const svc of SHIN_SERVICES) {
    const dur = svc.stops[svc.stops.length - 1][2];
    for (let dep = svc.firstDep; dep <= svc.lastDep; dep += svc.interval) {
      // elapsed minutes since this train departed (handle trains from previous calendar day)
      let elapsed = now - dep;
      if (elapsed < 0) elapsed += 1440; // yesterday's late departure still running
      if (elapsed > dur) continue;       // already arrived
      const pos = shinPos(svc.stops, elapsed);
      if (!pos) continue;
      // deterministic phase so dots don't all pulse in sync
      const phase = ((dep * 31 + svc.lineId.charCodeAt(0) * 7) % 628) / 100;
      result.push({
        id:        `shin-${svc.lineId}-${dep}-${svc.stops[0][0].toFixed(1)}`,
        route:     { id: svc.lineId, color: svc.color, path: [] },
        real:      true,
        realLat:   pos.lat, realLng: pos.lng,
        animLat:   pos.lat, animLng: pos.lng,
        fetchTime: 0, routeT: 0, routeSpeed: 0, // timetable position; animation driven by computeShinkansenTrains
        status:    'MOVE',
        stopMs:    0,
        phase,
      });
    }
  }
  return result;
}

// ── Tokyo Metro — JST clock-driven timetable simulation ──────
// Toei lines (A/S/I/E/AR) use real ODPT data from the worker.
// Tokyo Metro (G/M/H/T/C/Y/Z/N/F) uses headway-based simulation
// identical in approach to mini-tokyo-3d (no free real-time API).
const METRO_SERVICES = [
  { id:'G', interval:4,  dur:28 },  // Ginza:      Shibuya ↔ Asakusa
  { id:'M', interval:4,  dur:55 },  // Marunouchi: Ogikubo ↔ Ikebukuro
  { id:'H', interval:4,  dur:52 },  // Hibiya:     Naka-Meguro ↔ Kita-Senju
  { id:'T', interval:4,  dur:65 },  // Tozai:      Nakano ↔ Nishi-Funabashi
  { id:'C', interval:5,  dur:47 },  // Chiyoda:    Yoyogi-Uehara ↔ Ayase
  { id:'Y', interval:5,  dur:55 },  // Yurakucho:  Wakoshi ↔ Shin-kiba
  { id:'Z', interval:5,  dur:35 },  // Hanzomon:   Shibuya ↔ Oshiage
  { id:'N', interval:5,  dur:42 },  // Namboku:    Meguro ↔ Akabane-Iwabuchi
  { id:'F', interval:5,  dur:37 },  // Fukutoshin: Wakoshi ↔ Shibuya
];

function computeTokyoMetroTrains() {
  const nowMin = jstNow();
  const city = CITIES.tokyo;
  const result = [];
  for (const svc of METRO_SERVICES) {
    const route = city.routes.find(r => r.id === svc.id);
    if (!route || route.path.length < 2) continue;
    const path = route.path;
    const pathRev = path.slice().reverse();
    const firstDep = 5 * 60, lastDep = 23 * 60;
    for (const [dk, pts] of [['f', path], ['r', pathRev]]) {
      for (let dep = firstDep; dep <= lastDep; dep += svc.interval) {
        const elapsed = nowMin - dep;
        if (elapsed < 0 || elapsed > svc.dur) continue;
        const t = elapsed / svc.dur;
        const pos = t * (pts.length - 1);
        const i = Math.min(Math.floor(pos), pts.length - 2);
        const f = pos - i;
        const lat = pts[i][0] + f * (pts[i+1][0] - pts[i][0]);
        const lng = pts[i][1] + f * (pts[i+1][1] - pts[i][1]);
        const phase = ((dep * 31 + svc.id.charCodeAt(0) * 7 + (dk === 'r' ? 13 : 0)) % 628) / 100;
        result.push({
          id: `metro-${svc.id}-${dk}-${dep}`,
          route: { id: svc.id, color: route.color, path },
          real: true, animLat: lat, animLng: lng, realLat: lat, realLng: lng,
          fetchTime: 0, routeT: 0, routeSpeed: 0,
          status: 'MOVE', stopMs: 0, phase, seg: null,
        });
      }
    }
  }
  return result;
}

function _logFetch(city, status, detail, ms) {
  // Daily reset: if calendar day rolled over, zero all counters
  const today = new Date().toDateString();
  if (today !== _statsDay) {
    _statsDay = today;
    Object.keys(_fetchStats).forEach(k => { _fetchStats[k].ok = 0; _fetchStats[k].err = 0; });
  }

  // Increment counter (skip doesn't count — it means no real attempt was made)
  if (status === 'ok'  && _fetchStats[city]) _fetchStats[city].ok++;
  if (status === 'err' && _fetchStats[city]) _fetchStats[city].err++;

  _renderFetchStats();

  const now = new Date();
  const ts  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  _fetchLog.unshift({ ts, city, status, detail, ms }); // newest first
  if (_fetchLog.length > 8) _fetchLog.pop();
  const container = document.getElementById('fetch-log-rows');
  if (!container) return;
  container.innerHTML = _fetchLog.map(e => {
    const cls = e.status === 'ok' ? 'fl-ok' : e.status === 'skip' ? 'fl-skip' : 'fl-err';
    const durationPart = e.ms != null ? ` <span style="color:rgba(255,255,255,0.3)">${e.ms}ms</span>` : '';
    return `<div class="fl-row"><span class="fl-ts">${e.ts}</span><span class="${cls}">[${e.city}] ${e.detail}</span>${durationPart}</div>`;
  }).join('');
}

// Fetch real trains from worker and merge into simulation format
let _fetchInFlight = false;
async function fetchRealTrains() {
  if (!WORKER_URL) return;
  if (_fetchInFlight) { _logFetch(cityId, 'skip', 'skipped — prev fetch in flight', null); return; }
  // Capture cityId NOW — the fetch is async and the user may switch cities
  // before the response arrives. All state mutations check this snapshot.
  const fetchedCity = cityId;
  if (!['nyc','paris','seattle','helsinki','sydney','tokyo'].includes(fetchedCity)) return;

  _fetchInFlight = true;
  const t0 = Date.now();

  // AbortSignal.timeout() isn't supported in all browsers (needs Chrome 103+, Safari 16+).
  // Use AbortController + setTimeout instead for universal compatibility.
  const ac  = new AbortController();
  const tid = setTimeout(() => ac.abort(new Error('fetch timeout 12s')), 12000);

  try {
    const resp = await fetch(`${WORKER_URL}/trains/${fetchedCity}`, { signal: ac.signal });
    clearTimeout(tid);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    const elapsed = Date.now() - t0;

    // User switched cities while the request was in-flight — discard silently.
    if (cityId !== fetchedCity) return;

    const city   = CITIES[fetchedCity];
    const AGENCY_NAME = { nyc:'MTA', paris:'RATP', seattle:'Sound Transit', helsinki:'HSL', sydney:'Transport NSW', tokyo:'Toei (live) + Metro (timetable)' };
    const agency = AGENCY_NAME[fetchedCity] ?? fetchedCity;

    // Build a lookup from the previous fetch.
    const prevPos = {};
    const fetchTime = Date.now();
    trains.forEach(tr => {
      if (tr.real && tr.id) prevPos[tr.id] = {
        lat: tr.realLat, lng: tr.realLng,
        fetchTime: tr.fetchTime,
        routeT: tr.routeT,
      };
    });

    const realTrains = data.trains.map(t => {
      const route = city.routes.find(r => r.id === t.line)
                 ?? { id: t.line, color: t.color, path: [] };
      const prev = prevPos[t.id];

      const tooFar = prev &&
        (Math.abs(prev.lat - t.lat) + Math.abs(prev.lng - t.lng)) > 0.05;
      const hasPrev = prev && !tooFar && prev.fetchTime > 0;

      // Project the reported position onto the route polyline.
      // This snaps the train to the track and gives us a 1-D position (routeT ∈ [0,1])
      // we can advance frame-by-frame without the train ever drifting off the line.
      const routeT = projectOnRouteT(route.path, t.lat, t.lng);

      // Speed: how much routeT changed per ms between the last two fetches.
      // Positive = towards end of route, negative = towards start (reverse direction).
      let routeSpeed = 0;
      if (hasPrev && prev.routeT !== undefined) {
        const dtMs = fetchTime - prev.fetchTime;
        if (dtMs > 500 && dtMs < 120000) {
          routeSpeed = (routeT - prev.routeT) / dtMs;
        }
      }

      const startLL = routeAtT(route.path, routeT) ?? [t.lat, t.lng];

      return {
        id:          t.id,
        route,
        realLat:     t.lat,
        realLng:     t.lng,
        fetchTime,
        seg:         t.seg ?? null,
        routeT,
        routeSpeed,
        animLat:     startLL[0],
        animLng:     startLL[1],
        status:      t.status === 'AT_STOP' ? 'STOP' : 'MOVE',
        stopMs:      0,
        phase:       Math.random() * Math.PI * 2,
        real:        true,
      };
    });

    // Always update — even if count is low, stale data is worse than fewer trains
    // For Tokyo: Toei real trains are stored separately; render loop merges with Metro sim
    if (fetchedCity === 'tokyo') {
      _tokyoToeiTrains = realTrains;
    } else {
      trains = realTrains;
      syncCount();
    }
    isLive = true;

    // Show count + last updated time so it's obvious when data refreshed
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,'0');
    const mm  = String(now.getMinutes()).padStart(2,'0');
    const ss  = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('statusLabel').textContent =
      `Live · ${data.count} trains · ${agency} · updated ${hh}:${mm}:${ss}`;
    if (data.workerVersion && data.updatedAt) {
      document.getElementById('workerStamp').textContent =
        `${data.workerVersion} · built ${toPT(data.updatedAt)}`;
    }
    _logFetch(fetchedCity, 'ok', `${data.count} trains`, elapsed);

  } catch (e) {
    clearTimeout(tid);
    const elapsed = Date.now() - t0;
    // Only show the error if we're still on the city that triggered this fetch
    if (cityId !== fetchedCity) return;
    const msg = e.name === 'AbortError' ? 'timeout (12s)' : (e.message ?? String(e));
    console.warn('Worker fetch failed:', msg);
    document.getElementById('statusLabel').textContent = `Live · ${msg} — retrying…`;
    _logFetch(fetchedCity, 'err', msg, elapsed);
  } finally {
    _fetchInFlight = false;
  }
}

function syncCount() {
  document.getElementById('trainCountBig').textContent    = trains.length;
  document.getElementById('trainCountInline').textContent = trains.length;
}

// Project [lat, lng] onto the nearest point of a route polyline.
// Returns t ∈ [0, 1] using index parameterisation (0=first stop, 1=last stop).
function projectOnRouteT(path, lat, lng) {
  if (!path || path.length < 2) return 0;
  let bestDist = Infinity, bestT = 0;
  for (let i = 0; i < path.length - 1; i++) {
    const ax = path[i][0], ay = path[i][1];
    const bx = path[i+1][0], by = path[i+1][1];
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy;
    const s = len2 > 0 ? Math.max(0, Math.min(1, ((lat-ax)*dx + (lng-ay)*dy) / len2)) : 0;
    const dist = (lat - ax - s*dx)**2 + (lng - ay - s*dy)**2;
    if (dist < bestDist) { bestDist = dist; bestT = (i + s) / (path.length - 1); }
  }
  return bestT;
}

// Snap [lat, lng] to the nearest point on a route polyline.
// Returns the actual [lat, lng] of that nearest point.
// Used for Paris clock-driven animation: interpolate between stops in lat/lng
// space, then snap the result onto the track so the dot stays on the line.
function snapToRoute(path, lat, lng) {
  if (!path || path.length < 2) return [lat, lng];
  let bestDist = Infinity, bestLat = lat, bestLng = lng;
  for (let i = 0; i < path.length - 1; i++) {
    const ax = path[i][0], ay = path[i][1];
    const bx = path[i+1][0], by = path[i+1][1];
    const dx = bx - ax, dy = by - ay;
    const len2 = dx*dx + dy*dy;
    const s = len2 > 0 ? Math.max(0, Math.min(1, ((lat-ax)*dx + (lng-ay)*dy) / len2)) : 0;
    const nearLat = ax + s*dx, nearLng = ay + s*dy;
    const dist = (lat-nearLat)**2 + (lng-nearLng)**2;
    if (dist < bestDist) { bestDist = dist; bestLat = nearLat; bestLng = nearLng; }
  }
  return [bestLat, bestLng];
}

// Interpolate [lat, lng] from a route at t ∈ [0, 1]
function routeAtT(path, t) {
  if (!path || path.length < 2) return null;
  const pos = t * (path.length - 1);
  const i   = Math.min(Math.floor(pos), path.length - 2);
  const f   = pos - i;
  return [path[i][0] + f*(path[i+1][0]-path[i][0]),
          path[i][1] + f*(path[i+1][1]-path[i][1])];
}

// Returns [lat, lng] — real reported position or simulated interpolation
function trainLatLng(tr) {
  if (tr.real) return [tr.animLat ?? tr.realLat, tr.animLng ?? tr.realLng];
  const path = tr.route.path;
  if (!path || path.length < 2) return [0, 0];
  const pos = tr.t * (path.length - 1);
  const i   = Math.min(Math.floor(pos), path.length - 2);
  const f   = pos - i;
  return [path[i][0] + (path[i+1][0] - path[i][0]) * f,
          path[i][1] + (path[i+1][1] - path[i][1]) * f];
}

function stepTrains(dt) {
  trains.forEach(tr => {
    tr.phase += 0.05;

    if (tr.real) {
      if (tr.seg) {
        // Clock-driven: interpolate in lat/lng between the two timetable stop
        // coordinates, then snap the result onto the nearest point on the route
        // polyline. Snapping avoids projection-to-T-value errors that caused
        // trains to jump to wrong sections of symmetric or curved lines.
        const t = Math.max(0, Math.min(1, (Date.now() - tr.seg.tDep) / (tr.seg.tArr - tr.seg.tDep)));
        const iLat = tr.seg.aLat + t * (tr.seg.bLat - tr.seg.aLat);
        const iLng = tr.seg.aLng + t * (tr.seg.bLng - tr.seg.aLng);
        if (tr.route.path && tr.route.path.length >= 2) {
          const ll = snapToRoute(tr.route.path, iLat, iLng);
          tr.animLat = ll[0]; tr.animLng = ll[1];
        } else {
          tr.animLat = iLat; tr.animLng = iLng;
        }
      } else if (tr.route.path && tr.route.path.length >= 2 && tr.routeSpeed !== 0) {
        // NYC/Seattle: route-constrained animation driven by measured speed between fetches.
        tr.routeT = Math.max(0, Math.min(1, tr.routeT + tr.routeSpeed * dt));
        const ll = routeAtT(tr.route.path, tr.routeT);
        if (ll) { tr.animLat = ll[0]; tr.animLng = ll[1]; }
      }

      if (tr.status === 'STOP') {
        tr.stopMs += dt;
        if (tr.stopMs > 3000) { tr.status = 'MOVE'; tr.stopMs = 0; }
      }
      return;
    }

    // Simulated trains
    if (tr.status === 'STOP') {
      tr.stopMs += dt;
      if (tr.stopMs > 2000 + Math.random() * 1000) { tr.status = 'MOVE'; tr.stopMs = 0; }
    } else {
      tr.t += tr.speed * (dt / 16);
      if (tr.t >= 1) { tr.t = Math.random() * 0.04; if (Math.random() > 0.4) { tr.status = 'STOP'; tr.stopMs = 0; } }
      if (Math.random() < 0.001) { tr.status = 'STOP'; tr.stopMs = 0; }
    }
  });
}

// Poll real data every 20s for NYC
function startRealDataPolling() {
  if (!WORKER_URL) return;
  fetchRealTrains();
  // Poll every 15s — MTA feed updates every 30s, this catches it fast
  setInterval(() => {
    if (['nyc','paris','seattle','helsinki','sydney','tokyo'].includes(cityId)) fetchRealTrains();
  }, 15000);
}

function drawTrains() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const bright = ['#FFCD00','#FCCC0A','#B6BD00','#6CBE45','#6ECA97','#A7A9AC','#FF9500','#C3A400'];
  const lt = mapTheme === 'light';

  trains.forEach(tr => {
    const ll  = trainLatLng(tr);
    const pt  = leafletMap.latLngToContainerPoint(ll);
    const x=pt.x, y=pt.y;
    if (x<-40||x>w+40||y<-40||y>h+40) return;

    const r     = 11;
    const pulse = (Math.sin(tr.phase)+1)/2;
    const col   = tr.route.color;

    // Glow halo — smaller and softer in light mode
    const glowR = lt ? r * 2.2 : r * 3.5;
    const grd = ctx.createRadialGradient(x,y,0,x,y,glowR);
    grd.addColorStop(0, col + (lt ? '80' : 'be'));
    grd.addColorStop(0.3, col + (lt ? '30' : '50'));
    grd.addColorStop(1, col+'00');
    ctx.beginPath(); ctx.arc(x,y,glowR,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();

    // Pulse ring when stopped
    if (tr.status==='STOP') {
      const a = Math.round(pulse*(lt?100:150)).toString(16).padStart(2,'0');
      ctx.beginPath(); ctx.arc(x,y,r*(1.7+pulse*0.9),0,Math.PI*2);
      ctx.strokeStyle=col+a; ctx.lineWidth=2; ctx.stroke();
    }

    // Circle
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();

    // Rim — white on dark map, dark on light map
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = lt ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth=1.8; ctx.stroke();

    // Label
    ctx.fillStyle     = bright.includes(col.toUpperCase()) ? '#0a0c10' : '#ffffff';
    ctx.font          = 'bold 9.5px DM Mono,monospace';
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText(tr.route.id, x, y+0.5);
  });
}

// ── RENDER LOOP ───────────────────────────────────────────────
let last = 0;
let lastJapanUpdate = 0;
let lastTokyoMetroUpdate = 0;
let _tokyoToeiTrains = []; // real Toei trains from ODPT; merged with Metro sim trains in render loop
function loop(ts) {
  const dt = Math.min(ts-last, 100);
  last = ts;
  if (cityId === 'japan') {
    if (ts - lastJapanUpdate > 1000) {
      trains = computeShinkansenTrains();
      syncCount();
      lastJapanUpdate = ts;
    }
    trains.forEach(tr => { tr.phase = (tr.phase + 0.002 * dt) % (Math.PI * 2); });
  } else if (cityId === 'tokyo') {
    // Merge real Toei trains (from worker) + simulated Metro trains (clock-driven)
    if (ts - lastTokyoMetroUpdate > 1000) {
      trains = [..._tokyoToeiTrains, ...computeTokyoMetroTrains()];
      syncCount();
      lastTokyoMetroUpdate = ts;
    }
    trains.forEach(tr => {
      tr.phase += 0.05;
      if (tr.status === 'STOP') {
        tr.stopMs += dt;
        if (tr.stopMs > 3000) { tr.status = 'MOVE'; tr.stopMs = 0; }
      }
    });
  } else {
    stepTrains(dt);
  }
  drawTrains();
  requestAnimationFrame(loop);
}

// ── CITY SWITCH ───────────────────────────────────────────────
function switchCity(id) {
  if (id===cityId) return;
  const cover = document.getElementById('fadeCover');
  cover.classList.add('active');
  setTimeout(() => {
    cityId = id;
    const cfg = CITIES[id];
    document.getElementById('cityName').textContent = cfg.name;
    leafletMap.setView(cfg.center, cfg.zoom, {animate:false});
    setTimeout(() => { leafletMap.invalidateSize(); }, 200);
    drawRoutes();
    if (id === 'japan') {
      trains = computeShinkansenTrains();
      syncCount();
      lastJapanUpdate = 0;
      document.getElementById('statusLabel').textContent =
        `Timetable · ${trains.length} trains · JR Group · JST`;
    } else if (['nyc','paris','seattle','helsinki','sydney','tokyo'].includes(id)) {
      if (id === 'tokyo') { _tokyoToeiTrains = []; lastTokyoMetroUpdate = 0; }
      spawnTrains();
      document.getElementById('statusLabel').textContent = 'Connecting…';
      fetchRealTrains();
    }
    renderLegend();
    if (id === 'seattle') fetchLiveDepartures(); else updateDepartures();
    renderCitySwitcher();
    setTimeout(() => cover.classList.remove('active'), 380);
  }, 350);
}

// ── LEGEND ────────────────────────────────────────────────────
function renderLegend() {
  document.getElementById('linesRow').innerHTML = CITIES[cityId].lines.map(l =>
    `<div class="line-chip"><div class="line-dot" style="background:${l.color};box-shadow:0 0 5px ${l.color}88"></div>${l.name}</div>`
  ).join('');
}

// ── CLOCK ─────────────────────────────────────────────────────
const VERSION='v4.22', LAST_EDIT='2026-05-31 · 13:20 PT';

function toPT(isoString) {
  if (!isoString) return '—';
  const d = new Date(new Date(isoString).toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
  const date = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  return `${date} · ${time} PT`;
}
let _lastDepMin = -1;
function tick() {
  const n=new Date();
  document.getElementById('versionStamp').textContent=`${VERSION} · built ${LAST_EDIT}`;
  const tz = CITIES[cityId]?.timezone ?? 'UTC';
  const localStr = n.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric', timeZone: tz })
    + ' · ' + n.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone: tz });
  document.getElementById('localTime').textContent = localStr;
  // Refresh departure board every minute
  const curMin = n.getMinutes();
  if (curMin !== _lastDepMin) { _lastDepMin = curMin; updateDepartures(); }
}

// ── SOUTH BELLEVUE DEPARTURE BOARD (2 Line Westbound) ─────────
let _sbDeps = null; // cached live data: [{depMs, predicted}] or null

// Schedule fallback — Sound Transit 2 Line timetable-derived times as ms timestamps.
// 12-min peak (M-F 6–9 AM, 3–7 PM PT), 24-min otherwise. First train ~5:07 AM.
function sbScheduleDeps() {
  const pt = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Los_Angeles' }));
  const dayMin = pt.getHours() * 60 + pt.getMinutes();
  const isWeekend = pt.getDay() === 0 || pt.getDay() === 6;
  const midnightPT = new Date(pt); midnightPT.setHours(0,0,0,0);

  const deps = [];
  let t = 307;
  while (t <= 24 * 60 + 20) {
    deps.push(t);
    const inAMPeak = !isWeekend && t >= 360 && t < 540;
    const inPMPeak = !isWeekend && t >= 900 && t < 1140;
    t += (inAMPeak || inPMPeak) ? 12 : 24;
  }
  return deps.filter(d => d > dayMin).slice(0, 4).map(d => ({
    depMs: midnightPT.getTime() + (d % (24*60)) * 60000,
    predicted: false,
  }));
}

async function fetchLiveDepartures() {
  if (!WORKER_URL || cityId !== 'seattle') return;
  try {
    const resp = await fetch(`${WORKER_URL}/departures/south-bellevue`);
    if (!resp.ok) throw new Error('no data');
    const data = await resp.json();
    _sbDeps = (data.departures && data.departures.length) ? data.departures : null;
  } catch { _sbDeps = null; }
  updateDepartures();
}

function updateDepartures() {
  const panel = document.getElementById('departures-panel');
  if (cityId !== 'seattle') { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');

  const now = Date.now();
  let deps = _sbDeps ? _sbDeps.filter(d => d.depMs > now - 60000).slice(0, 4) : null;
  const isLive = deps && deps.some(d => d.predicted);
  if (!deps || !deps.length) deps = sbScheduleDeps();

  document.querySelector('.dep-source').textContent = isLive ? 'Live · Sound Transit' : 'Scheduled';

  const rows = document.getElementById('dep-rows');
  if (!deps.length) {
    rows.innerHTML = '<div class="dep-row"><span class="dep-dest" style="color:rgba(255,255,255,0.4)">No more service today</span></div>';
    return;
  }
  rows.innerHTML = deps.map(d => {
    const minUntil = Math.round((d.depMs - now) / 60000);
    const timeStr = new Date(d.depMs).toLocaleTimeString('en-US',
      { hour:'numeric', minute:'2-digit', timeZone:'America/Los_Angeles' });
    const minText = minUntil <= 1 ? 'Now' : `${minUntil} min`;
    const soonClass = minUntil <= 3 ? ' soon' : '';
    return `<div class="dep-row">
      <span class="dep-time">${timeStr}</span>
      <span class="dep-min${soonClass}">${minText}</span>
      <span class="dep-dest">Westlake</span>
    </div>`;
  }).join('');
}

// ── INIT ──────────────────────────────────────────────────────
drawRoutes();
spawnTrains();
renderLegend();
tick();
setInterval(tick, 1000);
renderCitySwitcher();
startRealDataPolling();
setInterval(fetchLiveDepartures, 45000);
setTimeout(() => {
  if (!isLive) document.getElementById('statusLabel').textContent =
    WORKER_URL ? 'Connecting to MTA…' : 'Simulated · Deploy worker for live data (no API key needed)';
}, 1500);
requestAnimationFrame(loop);

// ── OLED burn-in protection — pixel shift ─────────────────────────────────────
// Cycles body through a 9-position ±3px grid every 3 minutes.
// Shift is imperceptible at TV viewing distance but prevents static UI
// elements (logo, topbar, legend, version stamps) from burning in.
// CSS transition makes each move invisible even up close.
(function() {
  var positions = [[0,0],[3,0],[3,3],[0,3],[-3,3],[-3,0],[-3,-3],[0,-3],[2,-2]];
  var idx = 0;
  document.body.style.transition = 'transform 2s ease';
  setInterval(function() {
    idx = (idx + 1) % positions.length;
    var p = positions[idx];
    document.body.style.transform = 'translate(' + p[0] + 'px,' + p[1] + 'px)';
  }, 3 * 60 * 1000);
})();
</script>
