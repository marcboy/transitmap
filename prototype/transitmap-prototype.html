<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TransitMap — Ambient Prototype</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
  * { box-sizing:border-box; margin:0; padding:0; }
  :root { --bg:#080c14; --surface:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --muted:rgba(255,255,255,0.72); }
  html,body { width:100%; height:100%; background:var(--bg); color:#e8edf5; font-family:'DM Mono',monospace; overflow:hidden; user-select:none; }

  #map-wrap { position:absolute; top:0; left:0; width:100%; height:100%; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
  #map-wrap.ad-active { width:50%; }
  #leaflet-map { width:100%; height:100%; }
  .leaflet-control-zoom,.leaflet-control-attribution { display:none!important; }
  #tint { position:absolute; inset:0; background:rgba(4,8,18,0.2); pointer-events:none; z-index:399; }
  #trainCanvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:400; }

  .topbar { position:absolute; top:0; left:0; right:0; padding:24px 32px; display:flex; align-items:flex-start; justify-content:space-between; background:linear-gradient(to bottom,rgba(8,12,20,0.92) 0%,transparent 100%); pointer-events:none; z-index:500; transition:right 0.6s cubic-bezier(0.4,0,0.2,1); }
  .ad-active-ui .topbar,.ad-active-ui .legend { right:50%; }
  .city-name { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:#fff; line-height:1; }
  .city-sub  { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .status-pill { display:flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:7px 14px; font-size:11px; color:var(--muted); }
  .pulse-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  .city-switcher { position:absolute; top:24px; left:50%; transform:translateX(-50%); display:flex; gap:6px; z-index:500; background:rgba(8,12,20,0.85); border:1px solid var(--border); border-radius:30px; padding:5px; backdrop-filter:blur(12px); white-space:nowrap; }
  .ad-active-ui .city-switcher { left:25%; }
  .city-btn { font-family:'DM Mono',monospace; font-size:12px; padding:7px 18px; border-radius:20px; border:none; cursor:pointer; color:rgba(255,255,255,0.65); background:transparent; transition:all 0.25s; }
  .city-btn.active { background:rgba(255,255,255,0.15); color:#fff; }
  .city-btn:hover:not(.active) { color:#fff; }

  .legend { position:absolute; bottom:0; left:0; right:0; padding:28px 32px; background:linear-gradient(to top,rgba(8,12,20,0.92) 0%,transparent 100%); z-index:500; display:flex; align-items:flex-end; justify-content:space-between; transition:right 0.6s cubic-bezier(0.4,0,0.2,1); }
  .lines-row { display:flex; flex-wrap:wrap; gap:5px; max-width:70%; }
  .line-chip { display:flex; align-items:center; gap:5px; padding:4px 10px 4px 6px; border-radius:20px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); font-size:11px; color:rgba(255,255,255,0.9); }
  .line-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .version-stamp { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:1px; margin-top:6px; text-align:right; }
  .train-count { position:absolute; bottom:110px; right:32px; font-size:11px; color:rgba(255,255,255,0.7); letter-spacing:1px; text-align:right; z-index:500; text-transform:uppercase; transition:right 0.6s cubic-bezier(0.4,0,0.2,1); }
  .ad-active-ui .train-count { right:calc(50% + 32px); }
  .train-count span { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; color:rgba(255,255,255,0.85); display:block; line-height:1; }

  .ad-panel { position:absolute; top:0; right:0; width:50%; height:100%; background:#0d1120; border-left:1px solid rgba(255,255,255,0.08); z-index:600; display:flex; flex-direction:column; justify-content:center; padding:48px 44px; transform:translateX(100%); transition:transform 0.6s cubic-bezier(0.4,0,0.2,1); pointer-events:none; }
  .ad-panel.visible { transform:translateX(0); pointer-events:auto; }
  .ad-panel-inner { max-width:420px; margin:0 auto; width:100%; }
  .ad-top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
  .ad-label { font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.55); }
  .ad-skip { font-size:11px; color:rgba(255,255,255,0.75); cursor:pointer; padding:5px 10px; border-radius:6px; border:1px solid rgba(255,255,255,0.25); transition:all 0.2s; }
  .ad-skip:hover { color:#fff; border-color:rgba(255,255,255,0.6); }
  .ad-image-placeholder { width:100%; aspect-ratio:16/7; border-radius:12px; background:linear-gradient(135deg,#1e2d4a 0%,#2a1640 50%,#1a2d1a 100%); margin-bottom:28px; display:flex; align-items:center; justify-content:center; }
  .ad-img-label { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.4); }
  .ad-brand { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.6); margin-bottom:10px; }
  .ad-headline { font-family:'Syne',sans-serif; font-size:clamp(22px,3vw,34px); font-weight:800; color:#fff; line-height:1.1; margin-bottom:14px; }
  .ad-body { font-size:13px; color:rgba(255,255,255,0.75); line-height:1.65; margin-bottom:28px; }
  .ad-cta { display:inline-block; padding:12px 28px; background:#fff; color:#080c14; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:28px; }
  .ad-timer-bar { height:2px; background:rgba(255,255,255,0.07); border-radius:1px; overflow:hidden; }
  .ad-timer-fill { height:100%; background:rgba(255,255,255,0.3); transform-origin:left; border-radius:1px; }
  .ad-divider { position:absolute; top:0; left:50%; width:1px; height:100%; background:rgba(255,255,255,0.06); z-index:601; transform:scaleX(0); transition:transform 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s; }
  .ad-divider.visible { transform:scaleX(1); }
  .fade-cover { position:absolute; inset:0; background:var(--bg); z-index:700; opacity:0; pointer-events:none; transition:opacity 0.35s ease; }
  .fade-cover.active { opacity:1; }
</style>
</head>
<body>

<div id="map-wrap">
  <div id="leaflet-map"></div>
  <div id="tint"></div>
  <canvas id="trainCanvas"></canvas>
</div>

<div class="city-switcher">
  <button class="city-btn active" onclick="switchCity('nyc',this)">&#127482;&#127480; New York</button>
  <button class="city-btn"        onclick="switchCity('paris',this)">&#127467;&#127479; Paris</button>
  <button class="city-btn"        onclick="switchCity('seattle',this)">&#127482;&#127480; Seattle</button>
  <button class="city-btn"        onclick="switchCity('tokyo',this)">&#127471;&#127477; Tokyo</button>
  <button class="city-btn"        onclick="switchCity('japan',this)">&#127477; Shinkansen</button>
</div>

<div class="topbar">
  <div>
    <div class="city-name" id="cityName">New York City</div>
    <div class="city-sub">Live Transit &middot; <span id="trainCountInline">0</span> trains active</div>
    <div class="city-sub" id="localTime" style="margin-top:4px; letter-spacing:1px;"></div>
  </div>
  <div class="status-pill">
    <div class="pulse-dot"></div>
    <span id="statusLabel">Loading&hellip;</span>
  </div>
</div>

<div class="train-count"><span id="trainCountBig">0</span>trains</div>

<div class="legend">
  <div class="lines-row" id="linesRow"></div>
  <div>
    <div class="version-stamp" id="versionStamp">v1.3</div>
  </div>
</div>

<div class="ad-divider" id="adDivider"></div>
<div class="ad-panel" id="adPanel">
  <div class="ad-panel-inner">
    <div class="ad-top-row">
      <div class="ad-label">Advertisement</div>
      <div class="ad-skip" onclick="closeAd()">&#10005; Dismiss</div>
    </div>
    <div class="ad-image-placeholder"><div class="ad-img-label">Ad Creative</div></div>
    <div class="ad-brand">Sponsored</div>
    <div class="ad-headline">Explore the City<br>Like Never Before</div>
    <div class="ad-body">Discover hidden gems with local guides curated by real residents.</div>
    <div class="ad-cta">Learn More</div>
    <div class="ad-timer-bar"><div class="ad-timer-fill" id="adTimerFill"></div></div>
  </div>
</div>
<div class="fade-cover" id="fadeCover"></div>

// ── TRAINS — real data for NYC, simulation for other cities ──

// ⚠️ Set this to your deployed Cloudflare Worker URL after deploying
// e.g. 'https://transitmap-worker.YOUR-SUBDOMAIN.workers.dev'
const WORKER_URL = 'https://transitmap.marcboyer-public.workers.dev';

let isLive = false;  // true once real data is flowing

// Simulation fallback — used for Paris, Seattle, Tokyo
// and for NYC until the worker is deployed
function spawnTrains() {
  trains = [];
  CITIES[cityId].routes.forEach(route => {
    const n = 5 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      trains.push({
        route, t: Math.random(),
        speed: 0.00007 + Math.random() * 0.0001,
        status: Math.random() > 0.8 ? 'STOP' : 'MOVE',
        stopMs: 0, phase: Math.random() * Math.PI * 2,
        real: false,
      });
    }
  });
  syncCount();
}

// Fetch real trains from worker and merge into simulation format
async function fetchRealTrains() {
  if (!WORKER_URL) return;
  if (cityId !== 'nyc' && cityId !== 'seattle' && cityId !== 'paris') return;

  try {
    const resp = await fetch(`${WORKER_URL}/trains/${cityId}`);
    if (!resp.ok) throw new Error(`Worker ${resp.status}`);
    const data = await resp.json();

    const city = CITIES[cityId];
    const agency = cityId === 'nyc' ? 'MTA' : cityId === 'paris' ? 'RATP' : 'Sound Transit';

    // Build a lookup of existing train positions for smooth lerp
    const prevPos = {};
    trains.forEach(tr => {
      if (tr.real && tr.id) prevPos[tr.id] = { lat: tr.animLat ?? tr.realLat, lng: tr.animLng ?? tr.realLng };
    });

    const realTrains = data.trains.map(t => {
      const route = city.routes.find(r => r.id === t.line)
                 ?? { id: t.line, color: t.color, path: [] };
      const prev = prevPos[t.id];
      return {
        id:      t.id,
        route,
        realLat: t.lat,
        realLng: t.lng,
        // Lerp from previous known position to new one
        prevLat: prev ? prev.lat : t.lat,
        prevLng: prev ? prev.lng : t.lng,
        animLat: prev ? prev.lat : t.lat,
        animLng: prev ? prev.lng : t.lng,
        lerpT:   prev ? 0 : 1,  // start lerp from 0 if we have a previous position
        status:  t.status === 'AT_STOP' ? 'STOP' : 'MOVE',
        stopMs:  0,
        phase:   Math.random() * Math.PI * 2,
        real:    true,
      };
    });

    // Always update — even if count is low, stale data is worse than fewer trains
    trains = realTrains;
    isLive = true;
    syncCount();

    // Show count + last updated time so it's obvious when data refreshed
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,'0');
    const mm  = String(now.getMinutes()).padStart(2,'0');
    const ss  = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('statusLabel').textContent =
      `Live · ${data.count} trains · ${agency} · updated ${hh}:${mm}:${ss}`;

  } catch (e) {
    console.warn('Worker fetch failed:', e.message);
    document.getElementById('statusLabel').textContent = 'Live · fetch error — retrying…';
  }
}

function syncCount() {
  document.getElementById('trainCountBig').textContent    = trains.length;
  document.getElementById('trainCountInline').textContent = trains.length;
}

// Returns [lat, lng] — real reported position or simulated interpolation
function trainLatLng(tr) {
  if (tr.real) return [tr.animLat ?? tr.realLat, tr.animLng ?? tr.realLng];
  const path = tr.route.path;
  if (!path || path.length < 2) return [0, 0];
  const pos = tr.t * (path.length - 1);
  const i   = Math.min(Math.floor(pos), path.length - 2);
  const f   = pos - i;
  return [path[i][0] + (path[i+1][0] - path[i][0]) * f,
          path[i][1] + (path[i+1][1] - path[i][1]) * f];
}

function stepTrains(dt) {
  trains.forEach(tr => {
    tr.phase += 0.05;

    if (tr.real) {
      // Smoothly lerp from last position to current reported position
      // This gives fluid motion as trains move between 15s API updates
      if (tr.prevLat !== undefined && tr.lerpT < 1) {
        tr.lerpT = Math.min(1, tr.lerpT + dt / 15000); // complete over 15s
        tr.animLat = tr.prevLat + (tr.realLat - tr.prevLat) * tr.lerpT;
        tr.animLng = tr.prevLng + (tr.realLng - tr.prevLng) * tr.lerpT;
      } else {
        tr.animLat = tr.realLat;
        tr.animLng = tr.realLng;
      }

      if (tr.status === 'STOP') {
        tr.stopMs += dt;
        if (tr.stopMs > 3000) { tr.status = 'MOVE'; tr.stopMs = 0; }
      }
      return;
    }

    // Simulated trains
    if (tr.status === 'STOP') {
      tr.stopMs += dt;
      if (tr.stopMs > 2000 + Math.random() * 1000) { tr.status = 'MOVE'; tr.stopMs = 0; }
    } else {
      tr.t += tr.speed * (dt / 16);
      if (tr.t >= 1) { tr.t = Math.random() * 0.04; if (Math.random() > 0.4) { tr.status = 'STOP'; tr.stopMs = 0; } }
      if (Math.random() < 0.001) { tr.status = 'STOP'; tr.stopMs = 0; }
    }
  });
}

// Poll real data every 20s for NYC
function startRealDataPolling() {
  if (!WORKER_URL) return;
  fetchRealTrains();
  // Poll every 15s — MTA feed updates every 30s, this catches it fast
  setInterval(() => {
    if (cityId === 'nyc' || cityId === 'seattle' || cityId === 'paris') fetchRealTrains();
  }, 15000);
}

function drawTrains() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const bright = ['#FFCD00','#FCCC0A','#B6BD00','#6CBE45','#6ECA97','#A7A9AC','#FF9500','#C3A400'];

  trains.forEach(tr => {
    const ll  = trainLatLng(tr);
    const pt  = leafletMap.latLngToContainerPoint(ll);
    const x=pt.x, y=pt.y;
    if (x<-40||x>w+40||y<-40||y>h+40) return;

    const r     = 11;
    const pulse = (Math.sin(tr.phase)+1)/2;
    const col   = tr.route.color;

    // Glow halo
    const grd = ctx.createRadialGradient(x,y,0,x,y,r*3.5);
    grd.addColorStop(0, col+'be');
    grd.addColorStop(0.3, col+'50');
    grd.addColorStop(1, col+'00');
    ctx.beginPath(); ctx.arc(x,y,r*3.5,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();

    // Pulse ring when stopped
    if (tr.status==='STOP') {
      const a = Math.round(pulse*150).toString(16).padStart(2,'0');
      ctx.beginPath(); ctx.arc(x,y,r*(1.7+pulse*0.9),0,Math.PI*2);
      ctx.strokeStyle=col+a; ctx.lineWidth=2; ctx.stroke();
    }

    // Circle
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();

    // White rim
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.8; ctx.stroke();

    // Label
    ctx.fillStyle     = bright.includes(col.toUpperCase()) ? '#0a0c10' : '#ffffff';
    ctx.font          = 'bold 9.5px DM Mono,monospace';
    ctx.textAlign     = 'center';
    ctx.textBaseline  = 'middle';
    ctx.fillText(tr.route.id, x, y+0.5);
  });
}

// ── RENDER LOOP ───────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min(ts-last, 100);
  last = ts;
  stepTrains(dt);
  drawTrains();
  requestAnimationFrame(loop);
}

// ── CITY SWITCH ───────────────────────────────────────────────
function switchCity(id, btn) {
  if (id===cityId) return;
  const cover = document.getElementById('fadeCover');
  cover.classList.add('active');
  setTimeout(() => {
    cityId = id;
    const cfg = CITIES[id];
    document.getElementById('cityName').textContent = cfg.name;
    leafletMap.setView(cfg.center, cfg.zoom, {animate:false});
    // invalidateSize again after city switch in case container shifted
    setTimeout(() => { leafletMap.invalidateSize(); }, 200);
    drawRoutes();
    spawnTrains();
    renderLegend();
    document.querySelectorAll('.city-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    setTimeout(() => cover.classList.remove('active'), 380);
  }, 350);
}

function renderLegend() {
  document.getElementById('linesRow').innerHTML = CITIES[cityId].lines.map(l =>
    `<div class="line-chip"><div class="line-dot" style="background:${l.color};box-shadow:0 0 5px ${l.color}88"></div>${l.name}</div>`
  ).join('');
}

// ── CLOCK ─────────────────────────────────────────────────────
const VERSION='v2.2', LAST_EDIT='2026-05-27 UTC'; // updated on every push
function tick() {
  const n=new Date();
  const hh=String(n.getHours()).padStart(2,'0');
  const mm=String(n.getMinutes()).padStart(2,'0');
  const ss=String(n.getSeconds()).padStart(2,'0');
  document.getElementById('versionStamp').textContent=`${VERSION} · built ${LAST_EDIT}`;
  const tz = CITIES[cityId]?.timezone ?? 'UTC';
  const localStr = n.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric', timeZone: tz })
    + ' · ' + n.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone: tz });
  document.getElementById('localTime').textContent = localStr;
}

// ── ADS ───────────────────────────────────────────────────────
const AD_INTERVAL=5*60*1000, AD_DURATION=30*1000;
let adTimeout, adAutoDismiss;

function scheduleAd() {
  clearTimeout(adTimeout); clearTimeout(adAutoDismiss);
  adTimeout = setTimeout(showAd, AD_INTERVAL);
}

function showAd() {
  document.getElementById('map-wrap').classList.add('ad-active');
  document.body.classList.add('ad-active-ui');
  document.getElementById('adPanel').classList.add('visible');
  document.getElementById('adDivider').classList.add('visible');
  // Keep calling invalidateSize during the CSS transition
  const iv = setInterval(()=>leafletMap.invalidateSize(), 50);
  setTimeout(()=>{ clearInterval(iv); leafletMap.invalidateSize(); }, 700);
  const fill=document.getElementById('adTimerFill');
  fill.style.transition='none'; fill.style.transform='scaleX(1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.transition=`transform ${AD_DURATION/1000}s linear`;
    fill.style.transform='scaleX(0)';
  }));
  adAutoDismiss=setTimeout(closeAd, AD_DURATION);
}

function closeAd() {
  clearTimeout(adAutoDismiss);

  // 1. Slide ad panel out
  document.getElementById('adPanel').classList.remove('visible');
  document.getElementById('adDivider').classList.remove('visible');

  // 2. After panel slides out, expand map back to full width
  setTimeout(() => {
    document.getElementById('map-wrap').classList.remove('ad-active');
    document.body.classList.remove('ad-active-ui');

    // 3. Poll invalidateSize + resizeCanvas through the full CSS transition (600ms)
    const iv = setInterval(() => {
      resizeCanvas();
      leafletMap.invalidateSize();
    }, 50);
    setTimeout(() => {
      clearInterval(iv);
      resizeCanvas();
      leafletMap.invalidateSize();
    }, 700);

  }, 620); // wait for panel slide-out (0.6s) before expanding map

  scheduleAd();
}

// ── INIT ──────────────────────────────────────────────────────
drawRoutes();
spawnTrains();
renderLegend();
tick();
setInterval(tick, 1000);
scheduleAd();
startRealDataPolling();
setTimeout(() => {
  if (!isLive) document.getElementById('statusLabel').textContent =
    WORKER_URL ? 'Connecting to MTA…' : 'Simulated · Deploy worker for live data (no API key needed)';
}, 1500);
requestAnimationFrame(loop);
</script>
